<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Pulseras de piedras naturales Áurea</title>
  <desc id="desc">Banner elegante para el slider principal de Áurea.</desc>
  <defs>
